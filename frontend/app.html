<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>NEA-Alert | Intelligent Customer Support</title>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .nea-gradient {
            background: linear-gradient(135deg, #004A99 0%, #003366 100%);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .typing-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #94a3b8; display: inline-block;
            animation: bounce 1.2s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }
    </style>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center p-4">

    <div class="glass-panel w-full max-w-md h-[650px] rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden">

        <!-- Header -->
        <div class="nea-gradient p-5 flex items-center justify-between shadow-lg">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-white rounded-full flex items-center justify-center shadow-md">
                    <span class="text-[#004A99] font-black text-[10px]">NEA</span>
                </div>
                <div>
                    <h2 class="text-white font-bold text-base">NEA Support AI</h2>
                    <div class="flex items-center gap-1.5">
                        <span id="status-dot" class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                        <span class="text-[10px] text-blue-100 uppercase tracking-widest font-semibold">Online Helpdesk</span>
                    </div>
                </div>
            </div>
            <button class="text-white/70 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
            </button>
        </div>

        <!-- Messages -->
        <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar bg-slate-50/50">
            <!-- Welcome message -->
            <div class="flex flex-col items-start gap-1">
                <div class="bg-white text-gray-700 p-4 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] text-sm border border-gray-100 leading-relaxed">
                    Namaste! I am your <strong>NEA-Alert</strong> digital assistant. 🙏<br><br>
                    How can I help you today? You can ask about:<br>
                    • Bill payments &amp; Inquiry<br>
                    • Reporting a power outage<br>
                    • New connection status
                </div>
                <span class="text-[10px] text-gray-400 ml-1 mt-1">NEA Bot • <span id="start-time"></span></span>
            </div>
        </div>

        <!-- Input area -->
        <div class="p-5 bg-white border-t border-gray-100">
            <div class="flex items-center gap-2 bg-slate-100 rounded-2xl p-2 focus-within:ring-2 focus-within:ring-[#004A99]/20 transition-all">
                <button class="p-2 text-gray-400 hover:text-[#004A99]">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.51a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <input
                    id="user-input"
                    type="text"
                    placeholder="Type a message..."
                    class="flex-1 bg-transparent border-none focus:ring-0 text-sm text-gray-700 outline-none px-1"
                    onkeydown="if(event.key==='Enter') sendMessage()"
                >
                <button
                    id="send-btn"
                    onclick="sendMessage()"
                    class="bg-[#004A99] hover:bg-[#003366] text-white p-3 rounded-xl shadow-lg transition-transform active:scale-90"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 14-7-7 14-2-7-5-2Z"/></svg>
                </button>
            </div>
            <div class="mt-4 flex justify-around">
                <button onclick="quickSend('कृपया नेपालीमा जवाफ दिनुहोस्')" class="text-[10px] font-bold text-[#004A99] bg-blue-50 px-3 py-1 rounded-full border border-blue-100 hover:bg-blue-100 transition">REPLY IN NEPALI</button>
                <button onclick="quickSend('Where is the nearest NEA office?')" class="text-[10px] font-bold text-[#004A99] bg-blue-50 px-3 py-1 rounded-full border border-blue-100 hover:bg-blue-100 transition">OFFICE LOCATOR</button>
            </div>
        </div>
    </div>

<script>
    const API_BASE = 'http://127.0.0.1:8000';
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // Set welcome time
    document.getElementById('start-time').textContent = now();

    function now() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function addUserMessage(text) {
        const div = document.createElement('div');
        div.className = 'flex flex-col items-end gap-1';
        div.innerHTML = `
            <div class="bg-[#004A99] text-white p-4 rounded-2xl rounded-tr-none shadow-md max-w-[85%] text-sm font-medium">${escHtml(text)}</div>
            <span class="text-[10px] text-gray-400 mr-1 mt-1">You • ${now()}</span>
        `;
        messagesEl.appendChild(div);
        scrollDown();
    }

    function addTypingIndicator() {
        const div = document.createElement('div');
        div.id = 'typing-indicator';
        div.className = 'flex flex-col items-start gap-1';
        div.innerHTML = `
            <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 flex gap-1 items-center">
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
            </div>
        `;
        messagesEl.appendChild(div);
        scrollDown();
        return div;
    }

    function addBotMessage(text) {
        const indicator = document.getElementById('typing-indicator');
        if (indicator) indicator.remove();

        const div = document.createElement('div');
        div.className = 'flex flex-col items-start gap-1';
        div.innerHTML = `
            <div class="bg-white text-gray-700 p-4 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] text-sm border border-gray-100 leading-relaxed bot-bubble"></div>
            <span class="text-[10px] text-gray-400 ml-1 mt-1">NEA Bot • ${now()}</span>
        `;
        messagesEl.appendChild(div);
        scrollDown();
        return div.querySelector('.bot-bubble');
    }

    function scrollDown() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function setBusy(busy) {
        sendBtn.disabled = busy;
        inputEl.disabled = busy;
        sendBtn.classList.toggle('opacity-50', busy);
    }

    async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text) return;
        inputEl.value = '';
        setBusy(true);
        addUserMessage(text);
        const indicator = addTypingIndicator();

        try {
            const res = await fetch(`${API_BASE}/chat/stream`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: text })
            });

            if (!res.ok) throw new Error(`Server error: ${res.status}`);

            // Remove typing indicator and create bubble for streaming
            indicator.remove();
            const bubble = addBotMessage('');
            let full = '';

            const reader = res.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const lines = decoder.decode(value).split('\n');
                for (const line of lines) {
                    if (!line.startsWith('data:')) continue;
                    const d = line.slice(5).trim();
                    if (d === '[DONE]') break;
                    try {
                        full += JSON.parse(d).token;
                        bubble.innerHTML = escHtml(full).replace(/\n/g, '<br>');
                        scrollDown();
                    } catch {}
                }
            }
        } catch (err) {
            const indicator2 = document.getElementById('typing-indicator');
            if (indicator2) indicator2.remove();
            const bubble = addBotMessage('');
            bubble.innerHTML = `<span class="text-red-500">⚠ Could not connect to server.<br><small>${escHtml(err.message)}</small></span>`;
        }

        setBusy(false);
        inputEl.focus();
    }

    function quickSend(text) {
        inputEl.value = text;
        sendMessage();
    }
</script>
</body>
</html>
